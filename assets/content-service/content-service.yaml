# Local content service stack for Module C.
# Start: docker compose -f assets/content-service/content-service.yaml up -d
# API:   http://content-service.localhost/api/courses  (or https://content-service.localhost)
# Add to hosts file if needed: 127.0.0.1 content-service.localhost

name: content-service

services:
  traefik:
    image: traefik:v3.3
    container_name: content-service-traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls=true
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - content-service

  db:
    image: mariadb:11
    container_name: content-service-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-skill17}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-content-service}
    volumes:
      - db-data:/var/lib/mysql
      - ./db/content-service.sql:/docker-entrypoint-initdb.d/01-schema-and-data.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - content-service

  content-services:
    image: ghcr.io/skillsit-hu/es2025-s17-training-competition-hu-module_c-content-services:latest
    container_name: content-services
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-skill17}@db:3306/${MYSQL_DATABASE:-content-service}
    labels:
      - traefik.enable=true
      - traefik.docker.network=content-service
      # HTTP (simple local testing)
      - traefik.http.routers.content-services-http.rule=Host(`content-service.localhost`)
      - traefik.http.routers.content-services-http.entrypoints=web
      - traefik.http.routers.content-services-http.service=content-services
      # HTTPS (matches production-style routing)
      - traefik.http.routers.content-services.rule=Host(`content-service.localhost`)
      - traefik.http.routers.content-services.entrypoints=websecure
      - traefik.http.routers.content-services.tls=true
      - traefik.http.routers.content-services.service=content-services
      - traefik.http.services.content-services.loadbalancer.server.port=5000
    networks:
      - content-service

networks:
  content-service:
    name: content-service

volumes:
  db-data:
